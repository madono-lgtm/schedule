<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C1226">
<meta name="robots" content="noindex,nofollow">
<title>プライベートのご予約 | 真殿星哉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   真殿星哉 スケジュール調整アプリ — "Night Atlas"
   テーマ: 夜空・星座・余白の美
   ============================================================ */
:root{
  --ink:        #070B16;   /* 最深部の夜 */
  --night:      #0C1226;   /* ベース夜空 */
  --night-2:    #131B36;   /* カード面 */
  --night-3:    #1B2547;   /* ホバー面 */
  --hairline:   rgba(214,194,150,.16);
  --starlight:  #F4EDDD;   /* 主文字色 */
  --dim:        #9BA3BF;   /* 補助文字 */
  --gold:       #E3C078;   /* 金星 — シグネチャ */
  --gold-soft:  rgba(227,192,120,.14);
  --sys:        #6FD3E8;   /* システム開発 = 青い星 */
  --wall:       #F2A65A;   /* 外壁 = 橙の星 */
  --other:      #C39BE8;   /* その他 = 紫の星 */
  --radius:     14px;
  --disp: "Shippori Mincho", serif;
  --body: "Zen Kaku Gothic New", sans-serif;
  --latin: "Cormorant Garamond", serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--body);
  background:var(--ink);
  color:var(--starlight);
  overflow-x:hidden;
  line-height:1.7;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}

/* ---------- 星空キャンバス ---------- */
#sky{position:fixed;inset:0;z-index:0;display:block}
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 70% -10%, rgba(111,211,232,.07), transparent 60%),
    radial-gradient(ellipse 70% 45% at 15% 110%, rgba(227,192,120,.06), transparent 60%),
    linear-gradient(180deg, #070B16 0%, #0C1226 45%, #0A0F20 100%);
}

/* ============================================================
   スプラッシュ
   ============================================================ */
#splash{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:transparent;
  transition:opacity 1.1s ease, visibility 1.1s;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
#constellation{width:min(78vw,360px);height:auto;display:block;margin-bottom:42px}
.c-line{
  stroke:var(--gold);stroke-width:1;fill:none;opacity:.85;
  stroke-dasharray:1000;stroke-dashoffset:1000;
  animation:drawline 2.4s cubic-bezier(.4,0,.2,1) forwards;
}
.c-star{fill:var(--starlight);opacity:0;animation:starpop .7s ease forwards}
.c-star.big{fill:var(--gold)}
@keyframes drawline{to{stroke-dashoffset:0}}
@keyframes starpop{
  0%{opacity:0;transform:scale(0)}
  60%{opacity:1;transform:scale(1.8)}
  100%{opacity:1;transform:scale(1)}
}
.c-glow{fill:none;stroke:var(--gold);opacity:0;animation:glowring 2.6s ease 2.2s forwards}
@keyframes glowring{
  0%{opacity:0;transform:scale(.6);transform-origin:center}
  30%{opacity:.5}
  100%{opacity:0;transform:scale(1.6)}
}
.splash-eyebrow{
  font-family:var(--latin);font-style:italic;font-size:15px;letter-spacing:.5em;
  color:var(--gold);text-transform:uppercase;margin-bottom:18px;
  opacity:0;animation:riseIn 1.2s ease 2.0s forwards;
}
.splash-name{
  font-family:var(--disp);font-weight:800;
  font-size:clamp(44px,11vw,76px);letter-spacing:.14em;
  display:flex;
}
.splash-name span{
  opacity:0;filter:blur(14px);transform:translateY(16px);
  animation:kanjiIn 1.1s cubic-bezier(.2,.6,.2,1) forwards;
}
.splash-name span:nth-child(1){animation-delay:2.2s}
.splash-name span:nth-child(2){animation-delay:2.42s}
.splash-name span:nth-child(3){animation-delay:2.64s}
.splash-name span:nth-child(4){animation-delay:2.86s}
@keyframes kanjiIn{to{opacity:1;filter:blur(0);transform:translateY(0)}}
@keyframes riseIn{to{opacity:1;transform:translateY(0)}}
.splash-sub{
  margin-top:20px;font-size:13px;letter-spacing:.32em;color:var(--dim);
  opacity:0;animation:riseIn 1.2s ease 3.3s forwards;
}
#enterBtn{
  margin-top:56px;
  font-family:var(--disp);font-size:15px;letter-spacing:.42em;text-indent:.42em;
  color:var(--starlight);
  padding:16px 46px;border:1px solid var(--hairline);border-radius:999px;
  position:relative;overflow:hidden;
  opacity:0;animation:riseIn 1.2s ease 3.8s forwards;
  transition:border-color .4s, box-shadow .4s, transform .2s;
}
#enterBtn::before{
  content:"";position:absolute;inset:0;border-radius:999px;
  background:linear-gradient(120deg, transparent 30%, rgba(227,192,120,.25) 50%, transparent 70%);
  transform:translateX(-100%);animation:shimmer 3.2s ease 4.4s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}55%,100%{transform:translateX(100%)}}
#enterBtn:hover{border-color:var(--gold);box-shadow:0 0 32px rgba(227,192,120,.25);transform:translateY(-2px)}
.skip{
  position:absolute;bottom:max(24px, env(safe-area-inset-bottom));right:24px;
  font-size:11px;letter-spacing:.2em;color:var(--dim);opacity:.6;
}

/* ============================================================
   アプリ本体
   ============================================================ */
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 22px 80px;
  opacity:0;transform:translateY(10px);transition:opacity 1s ease .2s, transform 1s ease .2s;visibility:hidden}
#app.shown{opacity:1;transform:none;visibility:visible}

header.bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:26px 0 8px;
}
.bar-name{font-family:var(--disp);font-size:17px;letter-spacing:.22em;font-weight:600}
.bar-latin{font-family:var(--latin);font-style:italic;font-size:12px;letter-spacing:.3em;color:var(--gold)}

/* ---- プロフィール ---- */
.profile{
  display:flex;align-items:center;gap:20px;
  padding:30px 0 26px;border-bottom:1px solid var(--hairline);
}
.avatar{
  width:84px;height:84px;border-radius:50%;flex:none;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%, var(--night-3), var(--night-2));
  font-family:var(--disp);font-size:34px;color:var(--gold);font-weight:700;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.avatar-ring{
  position:absolute;inset:-7px;border-radius:50%;pointer-events:none;
  border:1px solid transparent;
  background:conic-gradient(from 0deg, transparent 0%, var(--gold) 12%, transparent 30%, transparent 55%, rgba(227,192,120,.5) 68%, transparent 85%) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:orbit 14s linear infinite;
}
@keyframes orbit{to{transform:rotate(360deg)}}
.profile h1{font-family:var(--disp);font-size:24px;letter-spacing:.16em;font-weight:700;line-height:1.4}
.profile .role{font-size:12.5px;color:var(--dim);letter-spacing:.12em;margin-top:4px}
.profile .role b{color:var(--gold);font-weight:500}

/* ---- ステップ星座インジケータ ---- */
.steps{display:flex;align-items:center;justify-content:center;gap:0;padding:30px 0 8px}
.step-node{display:flex;flex-direction:column;align-items:center;gap:8px;width:86px}
.step-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--night-3);border:1px solid var(--hairline);
  transition:all .5s ease;position:relative;
}
.step-node.active .step-dot{
  background:var(--gold);border-color:var(--gold);
  box-shadow:0 0 14px rgba(227,192,120,.8), 0 0 30px rgba(227,192,120,.35);
}
.step-node.done .step-dot{background:var(--gold);border-color:var(--gold);box-shadow:none;opacity:.7}
.step-label{font-size:10.5px;letter-spacing:.14em;color:var(--dim);transition:color .4s}
.step-node.active .step-label{color:var(--starlight)}
.step-line{flex:1;max-width:54px;height:1px;background:var(--hairline);margin-bottom:22px;position:relative;overflow:hidden}
.step-line::after{
  content:"";position:absolute;inset:0;background:var(--gold);
  transform:scaleX(0);transform-origin:left;transition:transform .7s cubic-bezier(.4,0,.2,1);
}
.step-line.lit::after{transform:scaleX(1)}

/* ---- 画面遷移 ---- */
.screen{display:none;animation:screenIn .7s cubic-bezier(.2,.6,.2,1)}
.screen.on{display:block}
@keyframes screenIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

.sec-eyebrow{
  font-family:var(--latin);font-style:italic;font-size:13px;letter-spacing:.42em;
  color:var(--gold);text-transform:uppercase;margin:34px 0 6px;
}
.sec-title{font-family:var(--disp);font-size:25px;font-weight:700;letter-spacing:.1em;margin-bottom:6px}
.sec-lead{font-size:13.5px;color:var(--dim);margin-bottom:26px}

/* ---- 種別カード(3つの星) ---- */
.type-card{
  display:flex;align-items:center;gap:18px;width:100%;text-align:left;
  background:linear-gradient(135deg, var(--night-2), rgba(19,27,54,.5));
  border:1px solid var(--hairline);border-radius:var(--radius);
  padding:22px 22px;margin-bottom:14px;position:relative;overflow:hidden;
  transition:transform .35s cubic-bezier(.2,.6,.2,1), border-color .35s, box-shadow .35s;
}
.type-card::before{
  content:"";position:absolute;top:-40%;right:-10%;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle, var(--c, var(--gold)) 0%, transparent 70%);
  opacity:.08;transition:opacity .4s, transform .6s;
}
.type-card:hover{transform:translateY(-3px);border-color:color-mix(in srgb, var(--c) 55%, transparent);
  box-shadow:0 14px 44px -14px color-mix(in srgb, var(--c) 35%, transparent)}
.type-card:hover::before{opacity:.18;transform:scale(1.25)}
.type-star{
  width:52px;height:52px;flex:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 32% 28%, color-mix(in srgb, var(--c) 28%, var(--night-2)), var(--night-2));
  border:1px solid color-mix(in srgb, var(--c) 40%, transparent);
  box-shadow:0 0 22px -4px color-mix(in srgb, var(--c) 45%, transparent), inset 0 0 14px color-mix(in srgb, var(--c) 18%, transparent);
}
.type-star svg{width:24px;height:24px;stroke:var(--c);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.type-body{flex:1;min-width:0}
.type-name{font-family:var(--disp);font-size:17px;font-weight:600;letter-spacing:.08em}
.type-desc{font-size:12px;color:var(--dim);margin-top:3px}
.type-dur{
  font-family:var(--latin);font-style:italic;font-size:13px;letter-spacing:.1em;
  color:var(--c);flex:none;
}
.type-card .arrow{flex:none;color:var(--dim);transition:transform .3s, color .3s}
.type-card:hover .arrow{transform:translateX(4px);color:var(--c)}

/* ---- カレンダー ---- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-family:var(--disp);font-size:19px;letter-spacing:.14em;font-weight:600}
.cal-month small{font-family:var(--latin);font-style:italic;font-size:13px;color:var(--gold);letter-spacing:.2em;margin-left:10px}
.cal-nav{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--hairline);
  display:flex;align-items:center;justify-content:center;color:var(--dim);
  transition:all .3s;
}
.cal-nav:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.cal-nav:disabled{opacity:.3;cursor:default}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{font-size:10.5px;letter-spacing:.1em;color:var(--dim);text-align:center;padding:6px 0}
.cal-dow.sun{color:#D98080}.cal-dow.sat{color:#7FA8D9}
.cal-day{
  aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--starlight);border:1px solid transparent;
  transition:all .25s;position:relative;
}
.cal-day:not(:disabled):hover{background:var(--night-3);border-color:var(--hairline)}
.cal-day:disabled{color:rgba(155,163,191,.25);cursor:default}
.cal-day.today::after{
  content:"";position:absolute;bottom:6px;width:4px;height:4px;border-radius:50%;background:var(--gold);
}
.cal-day.sel{
  background:var(--gold);color:var(--ink);font-weight:700;
  box-shadow:0 0 24px rgba(227,192,120,.45);
}

/* ---- 時間スロット ---- */
.slot-wrap{margin-top:26px;display:none}
.slot-wrap.on{display:block;animation:screenIn .5s ease}
.slot-date{font-family:var(--disp);font-size:15px;letter-spacing:.1em;margin-bottom:14px;color:var(--gold)}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:9px}
.slot{
  padding:13px 0;border-radius:10px;border:1px solid var(--hairline);
  background:var(--night-2);font-size:14px;letter-spacing:.06em;
  transition:all .25s;
}
.slot:not(:disabled):hover{border-color:var(--gold);background:var(--night-3)}
.slot:disabled{opacity:.28;cursor:default;text-decoration:line-through}
.slot.sel{background:var(--gold);color:var(--ink);font-weight:700;border-color:var(--gold);
  box-shadow:0 0 20px rgba(227,192,120,.4)}

/* ---- フォーム ---- */
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;letter-spacing:.16em;color:var(--dim);margin-bottom:8px}
.field label em{font-style:normal;color:var(--wall);margin-left:6px;font-size:10px}
.field input,.field textarea{
  width:100%;background:var(--night-2);border:1px solid var(--hairline);border-radius:10px;
  padding:14px 16px;color:var(--starlight);transition:border-color .3s, box-shadow .3s;
}
.field input:focus,.field textarea:focus{
  outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(227,192,120,.12);
}
.field textarea{min-height:110px;resize:vertical}
.summary-chip{
  display:flex;align-items:center;gap:12px;
  background:var(--gold-soft);border:1px solid rgba(227,192,120,.3);border-radius:12px;
  padding:14px 18px;margin-bottom:26px;font-size:13.5px;letter-spacing:.05em;
}
.summary-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c, var(--gold));
  box-shadow:0 0 10px var(--c, var(--gold));flex:none}

/* ---- ボタン ---- */
.btn-row{display:flex;gap:12px;margin-top:30px}
.btn{
  flex:1;padding:17px 0;border-radius:999px;font-size:14.5px;letter-spacing:.24em;text-indent:.24em;
  font-family:var(--disp);font-weight:600;transition:all .3s;
}
.btn.primary{
  background:linear-gradient(135deg, #EFD193, var(--gold) 55%, #C9A45C);
  color:var(--ink);box-shadow:0 8px 30px -8px rgba(227,192,120,.55);
}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 14px 38px -8px rgba(227,192,120,.7)}
.btn.primary:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn.ghost{border:1px solid var(--hairline);color:var(--dim);flex:.6}
.btn.ghost:hover{border-color:var(--dim);color:var(--starlight)}

/* ---- 完了チケット ---- */
.ticket{
  margin-top:30px;border-radius:18px;overflow:hidden;
  border:1px solid rgba(227,192,120,.35);
  background:linear-gradient(160deg, var(--night-2), var(--night));
  box-shadow:0 30px 80px -30px rgba(227,192,120,.25);
  animation:ticketIn 1s cubic-bezier(.2,.7,.2,1);
}
@keyframes ticketIn{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:none}}
.ticket-top{
  padding:30px 28px 24px;text-align:center;
  border-bottom:1px dashed rgba(227,192,120,.3);position:relative;
}
.ticket-top::before,.ticket-top::after{
  content:"";position:absolute;bottom:-11px;width:22px;height:22px;border-radius:50%;
  background:var(--ink);border:1px solid rgba(227,192,120,.35);
}
.ticket-top::before{left:-12px}.ticket-top::after{right:-12px}
.ticket-eyebrow{font-family:var(--latin);font-style:italic;font-size:12px;letter-spacing:.42em;color:var(--gold);text-transform:uppercase}
.ticket-no{font-family:var(--disp);font-size:30px;letter-spacing:.18em;font-weight:700;margin-top:8px}
.ticket-body{padding:24px 28px 30px}
.ticket-row{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid rgba(214,194,150,.08);font-size:14px}
.ticket-row:last-child{border:none}
.ticket-row .k{color:var(--dim);font-size:12px;letter-spacing:.14em;flex:none;padding-top:2px}
.ticket-row .v{text-align:right;letter-spacing:.04em}
.ticket-foot{padding:0 28px 28px;font-size:12px;color:var(--dim);text-align:center;letter-spacing:.06em}

/* ============================================================
   管理画面 (真殿さん専用)
   ============================================================ */
.bar-right{display:flex;align-items:center;gap:16px}
.admin-link{
  font-size:11px;letter-spacing:.2em;color:var(--dim);
  border:1px solid var(--hairline);border-radius:999px;padding:7px 14px;
  transition:all .3s;display:flex;align-items:center;gap:6px;
}
.admin-link:hover{color:var(--gold);border-color:var(--gold)}

#adminApp{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 22px 80px;display:none}
#adminApp.on{display:block;animation:screenIn .6s ease}

/* PINロック */
.pin-wrap{display:flex;flex-direction:column;align-items:center;padding:80px 0 40px;text-align:center}
.pin-moon{font-size:40px;margin-bottom:18px;filter:drop-shadow(0 0 18px rgba(227,192,120,.5))}
.pin-title{font-family:var(--disp);font-size:20px;letter-spacing:.2em;margin-bottom:6px}
.pin-sub{font-size:12px;color:var(--dim);margin-bottom:30px;letter-spacing:.1em}
.pin-dots{display:flex;gap:16px;margin-bottom:30px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1px solid var(--hairline);transition:all .25s}
.pin-dot.fill{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(227,192,120,.6)}
.pin-dots.err{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px}
.pin-key{
  height:72px;border-radius:50%;border:1px solid var(--hairline);
  font-family:var(--disp);font-size:22px;color:var(--starlight);
  transition:all .2s;background:rgba(19,27,54,.5);
}
.pin-key:hover{border-color:var(--gold);background:var(--night-3)}
.pin-key:active{transform:scale(.92);background:var(--gold-soft)}
.pin-key.fn{font-size:13px;color:var(--dim);letter-spacing:.1em}

/* 管理ダッシュボード */
.adm-head{display:flex;align-items:center;justify-content:space-between;padding:26px 0 20px}
.adm-title{font-family:var(--disp);font-size:22px;letter-spacing:.16em;font-weight:700}
.adm-title small{font-family:var(--latin);font-style:italic;font-size:12px;color:var(--gold);letter-spacing:.3em;display:block;margin-bottom:4px}
.adm-tabs{display:flex;gap:8px;margin-bottom:26px;border-bottom:1px solid var(--hairline)}
.adm-tab{
  padding:12px 18px;font-size:13.5px;letter-spacing:.12em;color:var(--dim);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .3s;
}
.adm-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.adm-pane{display:none}
.adm-pane.on{display:block;animation:screenIn .4s ease}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px}
.stat{
  background:var(--night-2);border:1px solid var(--hairline);border-radius:var(--radius);
  padding:18px 16px;text-align:center;
}
.stat .n{font-family:var(--disp);font-size:28px;font-weight:700;color:var(--gold)}
.stat .l{font-size:10.5px;letter-spacing:.14em;color:var(--dim);margin-top:2px}

.bk-card{
  background:var(--night-2);border:1px solid var(--hairline);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:12px;position:relative;overflow:hidden;
}
.bk-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--gold))}
.bk-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.bk-when{font-family:var(--disp);font-size:15.5px;letter-spacing:.06em;font-weight:600}
.bk-type{font-size:11px;letter-spacing:.08em;color:var(--c,var(--gold));margin-top:2px}
.bk-no{font-family:var(--latin);font-style:italic;font-size:12px;color:var(--dim);letter-spacing:.1em;flex:none}
.bk-info{font-size:13px;color:var(--dim);margin-top:10px;line-height:1.9}
.bk-info b{color:var(--starlight);font-weight:500}
.bk-memo{font-size:12.5px;background:rgba(7,11,22,.5);border-radius:8px;padding:10px 14px;margin-top:10px;color:var(--dim)}
.bk-actions{display:flex;gap:10px;margin-top:14px}
.bk-btn{
  font-size:11.5px;letter-spacing:.12em;padding:8px 16px;border-radius:999px;
  border:1px solid var(--hairline);color:var(--dim);transition:all .25s;
}
.bk-btn:hover{color:var(--starlight);border-color:var(--dim)}
.bk-btn.danger:hover{color:#E89090;border-color:#E89090}
.bk-empty{
  text-align:center;padding:60px 0;color:var(--dim);font-size:13px;letter-spacing:.1em;
}
.bk-empty .e-star{font-size:30px;display:block;margin-bottom:12px;opacity:.5}

.filter-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.f-chip{
  font-size:11.5px;letter-spacing:.08em;padding:8px 15px;border-radius:999px;
  border:1px solid var(--hairline);color:var(--dim);transition:all .25s;
}
.f-chip.on{color:var(--ink);background:var(--gold);border-color:var(--gold);font-weight:700}

/* 休止日 */
.block-add{display:flex;gap:10px;margin-bottom:20px}
.block-add input{
  flex:1;background:var(--night-2);border:1px solid var(--hairline);border-radius:10px;
  padding:13px 16px;color:var(--starlight);color-scheme:dark;
}
.block-add input:focus{outline:none;border-color:var(--gold)}
.block-add .btn{flex:none;padding:0 26px}
.block-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--night-2);border:1px solid var(--hairline);border-radius:10px;
  padding:13px 18px;margin-bottom:9px;font-size:14px;letter-spacing:.05em;
}
.block-item button{color:var(--dim);font-size:12px;letter-spacing:.1em;transition:color .25s}
.block-item button:hover{color:#E89090}

@media (max-width:480px){
  .steps .step-node{width:72px}
  .profile h1{font-size:20px}
  .type-dur{display:none}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-delay:0s !important;transition-duration:.01ms !important}
  #splash .splash-name span,.splash-eyebrow,.splash-sub,#enterBtn{opacity:1;filter:none;transform:none}
  .c-line{stroke-dashoffset:0}.c-star{opacity:1}
}

/* private.html 用 */
.priv-hero{text-align:center;padding:26px 0 20px}
.priv-moon{font-size:38px;margin-bottom:12px;color:var(--other);filter:drop-shadow(0 0 18px rgba(195,155,232,.5))}
.priv-hero .sec-title{margin-bottom:6px}
#addMode .summary-chip .add-title{font-family:var(--disp);font-size:17px;letter-spacing:.06em;margin-bottom:4px}
#addMode .summary-chip .add-when{font-size:13px;color:var(--dim)}
</style>

<body>

<div class="aurora"></div>
<canvas id="sky" aria-hidden="true"></canvas>

<main id="app" class="shown">
  <header class="bar">
    <div class="bar-name">真殿星哉</div>
    <div class="bar-latin" style="color:var(--other)">Private</div>
  </header>

  <div id="demoNote" style="display:none;margin:16px 0 -4px;padding:10px 14px;border:1px solid rgba(227,192,120,.3);border-radius:10px;background:var(--gold-soft);color:var(--gold);font-size:12px;letter-spacing:.04em"></div>

  <!-- ====== カレンダー追加モード（?add=） ====== -->
  <section id="addMode" style="display:none">
    <div class="priv-hero">
      <div class="priv-moon">☾</div>
      <p class="sec-eyebrow" style="color:var(--other)">Approved</p>
      <h2 class="sec-title">ご予約が確定しました</h2>
      <p class="sec-lead">下のボタンから、iPhoneのカレンダーに追加できます。</p>
    </div>
    <div class="summary-chip" id="addSummary" style="--c:var(--other);display:block;text-align:center"></div>
    <button class="btn primary" id="addBtn" style="width:100%;margin-top:20px">📅 iPhoneカレンダーに追加</button>
  </section>

  <!-- ====== 予約フロー ====== -->
  <div id="bookFlow">
    <div class="priv-hero">
      <div class="priv-moon">☾</div>
      <p class="sec-eyebrow" style="color:var(--other)">Private Booking</p>
      <h2 class="sec-title">個人的なご予約</h2>
      <p class="sec-lead">承認制です。申請いただいた後、こちらで確認のうえご連絡します。</p>
    </div>

    <nav class="steps" aria-label="進行状況">
      <div class="step-node active" data-step="1"><div class="step-dot"></div><div class="step-label">日時</div></div>
      <div class="step-line" id="pline1"></div>
      <div class="step-node" data-step="2"><div class="step-dot"></div><div class="step-label">ご連絡先</div></div>
      <div class="step-line" id="pline2"></div>
      <div class="step-node" data-step="3"><div class="step-dot"></div><div class="step-label">申請完了</div></div>
    </nav>

    <!-- STEP1 日時 -->
    <section class="screen on" id="ps1">
      <div class="cal-head">
        <button class="cal-nav" id="prevM" aria-label="前の月">←</button>
        <div class="cal-month" id="calMonth"></div>
        <button class="cal-nav" id="nextM" aria-label="次の月">→</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="slot-wrap" id="slotWrap">
        <p class="slot-date" id="slotDate"></p>
        <div class="slots" id="slots"></div>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="pToStep2" disabled style="flex:1">情報の入力へ</button>
      </div>
    </section>

    <!-- STEP2 連絡先 -->
    <section class="screen" id="ps2">
      <p class="sec-eyebrow" style="color:var(--other)">Contact</p>
      <h2 class="sec-title">ご連絡先を教えてください</h2>
      <p class="sec-lead">承認後のご連絡に使用します。</p>

      <div class="summary-chip" id="pchip"></div>

      <div class="field"><label for="pName">お名前 <em>必須</em></label>
        <input id="pName" type="text" autocomplete="name" placeholder="例）山田 花子"></div>
      <div class="field"><label for="pInsta">インスタグラムID <em>必須</em></label>
        <input id="pInsta" type="text" autocomplete="off" placeholder="例）@hanako_style（@はあってもなくてもOK）"></div>
      <div class="field"><label for="pLine">LINE友だち追加URL（任意）</label>
        <input id="pLine" type="url" inputmode="url" autocomplete="off" placeholder="例）https://line.me/ti/p/xxxx"></div>

      <div class="btn-row">
        <button class="btn ghost" data-back="1">戻る</button>
        <button class="btn primary" id="pSubmit">この内容で申請する</button>
      </div>
    </section>

    <!-- STEP3 完了 -->
    <section class="screen" id="ps3">
      <div class="priv-hero">
        <div class="priv-moon">✦</div>
        <p class="sec-eyebrow" style="color:var(--other);text-align:center">Request Sent</p>
        <h2 class="sec-title" style="text-align:center">申請を受け付けました</h2>
      </div>
      <div class="ticket">
        <div class="ticket-body">
          <div class="ticket-row"><span class="k">お名前</span><span class="v" id="doneName"></span></div>
          <div class="ticket-row"><span class="k">ご希望日時</span><span class="v" id="doneWhen"></span></div>
        </div>
        <p class="ticket-foot">真殿星哉が内容を確認し、承認され次第<br>インスタグラム／LINEでご連絡します。</p>
      </div>
    </section>
  </div>
</main>


<script>
/* ================= 星空キャンバス ================= */
(function(){
  const cv = document.getElementById('sky'), ctx = cv.getContext('2d');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,stars=[],shooting=null,t=0;
  function resize(){
    W = cv.width = innerWidth * devicePixelRatio;
    H = cv.height = innerHeight * devicePixelRatio;
    cv.style.width = innerWidth+'px'; cv.style.height = innerHeight+'px';
    const n = Math.min(220, Math.floor(innerWidth*innerHeight/9000));
    stars = Array.from({length:n}, () => ({
      x:Math.random()*W, y:Math.random()*H,
      r:(Math.random()*1.3+.3)*devicePixelRatio,
      p:Math.random()*Math.PI*2, s:.4+Math.random()*1.2,
      gold:Math.random()<.12
    }));
  }
  function frame(){
    t+=.016;
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      const tw = reduced ? .8 : .55 + .45*Math.sin(t*s.s + s.p);
      ctx.globalAlpha = tw*.9;
      ctx.fillStyle = s.gold ? '#E3C078' : '#E8ECF6';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
    }
    if(!reduced){
      if(!shooting && Math.random()<.004){
        shooting = {x:Math.random()*W*.7+W*.15, y:Math.random()*H*.3, vx:(6+Math.random()*5)*devicePixelRatio, vy:(3+Math.random()*2)*devicePixelRatio, life:1};
      }
      if(shooting){
        const sh=shooting;
        ctx.globalAlpha = sh.life;
        const g = ctx.createLinearGradient(sh.x,sh.y,sh.x-sh.vx*9,sh.y-sh.vy*9);
        g.addColorStop(0,'rgba(244,237,221,.95)'); g.addColorStop(1,'transparent');
        ctx.strokeStyle=g; ctx.lineWidth=1.4*devicePixelRatio;
        ctx.beginPath(); ctx.moveTo(sh.x,sh.y); ctx.lineTo(sh.x-sh.vx*9, sh.y-sh.vy*9); ctx.stroke();
        sh.x+=sh.vx; sh.y+=sh.vy; sh.life-=.022;
        if(sh.life<=0) shooting=null;
      }
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  addEventListener('resize', resize);
  resize(); frame();
})();

</script>
<script type="module">
import * as db from './db.js';

const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const demo = !db.configured;

const dkey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function fmtDate(d){ const dow=['日','月','火','水','木','金','土'][d.getDay()]; return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dow}）`; }
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

/* ===== .ics（カレンダー招待）ビルダー ===== */
function pad(n){return String(n).padStart(2,'0')}
function buildICS({title,dateKey,time,durMin,desc}){
  const [Y,M,D]=dateKey.split('-').map(Number);
  const [h,mi]=time.split(':').map(Number);
  const start=`${Y}${pad(M)}${pad(D)}T${pad(h)}${pad(mi)}00`;
  const e=new Date(Y,M-1,D,h,mi+(durMin||60));
  const end=`${e.getFullYear()}${pad(e.getMonth()+1)}${pad(e.getDate())}T${pad(e.getHours())}${pad(e.getMinutes())}00`;
  const n=new Date();
  const stamp=`${n.getUTCFullYear()}${pad(n.getUTCMonth()+1)}${pad(n.getUTCDate())}T${pad(n.getUTCHours())}${pad(n.getUTCMinutes())}${pad(n.getUTCSeconds())}Z`;
  const uid=`${Date.now()}-${Math.random().toString(36).slice(2)}@madono`;
  const esc=s=>String(s||'').replace(/([,;\\])/g,'\\$1').replace(/\n/g,'\\n');
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Madono Schedule//JP','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',`UID:${uid}`,`DTSTAMP:${stamp}`,`DTSTART:${start}`,`DTEND:${end}`,`SUMMARY:${esc(title)}`,
    desc?`DESCRIPTION:${esc(desc)}`:'','END:VEVENT','END:VCALENDAR'].filter(Boolean).join('\r\n');
}
function openICS(ics){ window.location.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics); }

/* ===== ?add= が付いていたら「カレンダー追加」モード ===== */
const params=new URLSearchParams(location.search);
if(params.has('add')){
  let p=null;
  try{ p=JSON.parse(decodeURIComponent(escape(atob(params.get('add'))))); }catch(e){}
  showAddMode(p);
} else {
  initBooking();
}

function showAddMode(p){
  $('#bookFlow').style.display='none';
  const box=$('#addMode'); box.style.display='block';
  if(!p){ $('#addSummary').textContent='リンクが正しくありません。'; $('#addBtn').style.display='none'; return; }
  const [Y,M,D]=p.d.split('-').map(Number);
  const dow=['日','月','火','水','木','金','土'][new Date(Y,M-1,D).getDay()];
  $('#addSummary').innerHTML=`<div class="add-title">${escapeHtml(p.t||'プライベート')}</div><div class="add-when">${Y}年${M}月${D}日（${dow}） ${p.tm}〜</div>`;
  $('#addBtn').addEventListener('click',()=>{
    openICS(buildICS({title:p.t||'プライベート', dateKey:p.d, time:p.tm, durMin:p.du||60, desc:'真殿星哉との予定'}));
  });
}

/* ===== 予約フロー ===== */
let PRIV={ name:'プライベート', dur:'60分', durMin:60, color:'#C39BE8' };
const state={ date:null, time:null };
const today=new Date(); today.setHours(0,0,0,0);
let calY=today.getFullYear(), calM=today.getMonth();
const MONTH_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
let blocked=[];

async function initBooking(){
  if(demo){ const n=$('#demoNote'); if(n){ n.textContent='デモ表示中：db.js に Supabase 設定を入れると申請が保存されます'; n.style.display='block'; } }
  if(!demo){
    try{ const c=await db.privateCategory(); if(c){ PRIV.name=c.name||PRIV.name; PRIV.dur=c.duration||PRIV.dur; PRIV.durMin=parseInt(c.duration)||60; PRIV.color=c.color||PRIV.color; } }catch(e){}
    try{ blocked=await db.blockedDays(); }catch(e){ blocked=[]; }
  }
  document.documentElement.style.setProperty('--accent', PRIV.color);
  renderCal();
}

function goStep(n){
  $$('.screen').forEach(s=>s.classList.remove('on'));
  $('#ps'+n).classList.add('on');
  $$('.step-node').forEach(nd=>{ const k=+nd.dataset.step; nd.classList.toggle('active',k===n); nd.classList.toggle('done',k<n); });
  $('#pline1').classList.toggle('lit', n>=2);
  $('#pline2').classList.toggle('lit', n>=3);
  scrollTo({top:0,behavior:'smooth'});
}
$$('[data-back]').forEach(b=>b.addEventListener('click',()=>goStep(+b.dataset.back)));

function renderCal(){
  $('#calMonth').innerHTML=`${calY}年 ${calM+1}月 <small>${MONTH_EN[calM]}</small>`;
  const grid=$('#calGrid'); grid.innerHTML='';
  ['日','月','火','水','木','金','土'].forEach((d,i)=>{ const el=document.createElement('div'); el.className='cal-dow'+(i===0?' sun':i===6?' sat':''); el.textContent=d; grid.appendChild(el); });
  const first=new Date(calY,calM,1), startDow=first.getDay();
  const days=new Date(calY,calM+1,0).getDate();
  for(let i=0;i<startDow;i++) grid.appendChild(document.createElement('div'));
  const max=new Date(today); max.setMonth(max.getMonth()+2);
  for(let d=1; d<=days; d++){
    const date=new Date(calY,calM,d);
    const btn=document.createElement('button'); btn.className='cal-day'; btn.textContent=d;
    if(+date===+today) btn.classList.add('today');
    const disabled = date<today || date>max || date.getDay()===0 || blocked.includes(dkey(date));
    btn.disabled=disabled;
    if(state.date && +date===+state.date) btn.classList.add('sel');
    if(!disabled){
      btn.addEventListener('click', async ()=>{
        state.date=date; state.time=null;
        $$('.cal-day').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel');
        await renderSlots(); $('#pToStep2').disabled=true;
      });
    }
    grid.appendChild(btn);
  }
  const prevable=new Date(calY,calM,1) > new Date(today.getFullYear(),today.getMonth(),1);
  $('#prevM').disabled=!prevable;
  $('#nextM').disabled=new Date(calY,calM+1,1) > max;
}
$('#prevM').addEventListener('click',()=>{ calM--; if(calM<0){calM=11;calY--;} renderCal(); });
$('#nextM').addEventListener('click',()=>{ calM++; if(calM>11){calM=0;calY++;} renderCal(); });

async function renderSlots(){
  $('#slotDate').textContent=fmtDate(state.date)+' の空き状況';
  const wrap=$('#slots');
  wrap.innerHTML='<p style="grid-column:1/-1;color:var(--dim);font-size:13px;letter-spacing:.1em">空き状況を確認中…</p>';
  let taken=[];
  if(!demo){ try{ taken=await db.takenSlots(dkey(state.date)); }catch(e){ taken=[]; } }
  wrap.innerHTML='';
  const seed=state.date.getDate()*7 + state.date.getMonth()*3;
  const hours=[10,11,13,14,15,16,17,18,19];
  hours.forEach((h,i)=>{
    const btn=document.createElement('button'); btn.className='slot'; btn.textContent=`${h}:00`;
    const isToday=+state.date===+today;
    const past=isToday && h<=new Date().getHours();
    const busy= demo ? ((seed+i*5)%9===0) : false;
    const isTaken= taken.includes(`${h}:00`);
    btn.disabled=past||busy||isTaken;
    btn.addEventListener('click',()=>{ state.time=`${h}:00`; $$('.slot').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); $('#pToStep2').disabled=false; });
    wrap.appendChild(btn);
  });
  $('#slotWrap').classList.add('on');
}

$('#pToStep2').addEventListener('click',()=>{
  const chip=$('#pchip'); chip.style.setProperty('--c',PRIV.color);
  chip.innerHTML=`<span class="dot"></span><span>${escapeHtml(PRIV.name)}　|　${fmtDate(state.date)} ${state.time}〜</span>`;
  goStep(2);
});

/* 申請送信 */
$('#pSubmit').addEventListener('click', async ()=>{
  const name=$('#pName').value.trim();
  let insta=$('#pInsta').value.trim().replace(/^@+/,'');
  const line=$('#pLine').value.trim();
  if(!name){ $('#pName').focus(); $('#pName').style.borderColor='var(--wall)'; return; }
  if(!insta){ $('#pInsta').focus(); $('#pInsta').style.borderColor='var(--wall)'; return; }
  const req={ no:'PV-'+String(Date.now()).slice(-6), type:PRIV.name, dur:PRIV.dur, color:PRIV.color,
    dateKey:dkey(state.date), dateLabel:fmtDate(state.date), time:state.time, name, instagram:insta, lineUrl:line||null };
  const btn=$('#pSubmit'); const o=btn.textContent; btn.disabled=true; btn.textContent='申請を送信中…';
  try{
    if(!demo) await db.submitPrivateRequest(req);
    $('#doneWhen').textContent=`${fmtDate(state.date)} ${state.time}〜`;
    $('#doneName').textContent=name+' さま（@'+insta+'）';
    goStep(3);
  }catch(e){ console.error(e); alert('申請の送信に失敗しました。通信環境をご確認のうえ、もう一度お試しください。'); }
  finally{ btn.disabled=false; btn.textContent=o; }
});

</script>
